<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book - Smart Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #msg-box { display:none; padding:12px; border-radius:var(--radius-sm); margin-bottom:20px; font-size:13px; font-weight:500; text-align:center; }
        .msg-error { display:block!important; background:var(--status-error-bg); color:var(--status-error); border:1px solid rgba(239, 68, 68, 0.25); }
        .msg-success { display:block!important; background:var(--status-success-bg); color:var(--status-success); border:1px solid rgba(16, 185, 129, 0.25); }
        .form-card { max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="/static/my.logo.png" alt="Logo" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-glass-light);">
            <span class="sidebar-title">SmartLMS</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/"><i data-lucide="layout-dashboard" class="icon"></i> Dashboard</a></li>
            <li><a href="/viewbook"><i data-lucide="book" class="icon"></i> Book Inventory</a></li>
            <li><a href="/viewmember"><i data-lucide="users" class="icon"></i> Members</a></li>
            <li><a href="/all-transactions" class="active"><i data-lucide="arrow-left-right" class="icon"></i> Transactions</a></li>
            <li><a href="/analytics"><i data-lucide="bar-chart-2" class="icon"></i> Analytics</a></li>
            <li><a href="/settings"><i data-lucide="settings" class="icon"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-wrapper">
        <header class="top-nav">
            <div class="page-title">
                <p>Activity Logs</p>
                <h1>Issue Book</h1>
            </div>
            <div class="nav-actions">
                <a href="/all-transactions" class="btn btn-secondary"><i data-lucide="arrow-left"></i> Back to Transactions</a>
            </div>
        </header>

        <div class="content-area">
            <div class="glass-card form-card">
                <form id="issue-book-form">
                    <div id="msg-box"></div>

                    <div class="flex-between gap-4">
                        <div class="form-group" style="flex: 1;">
                            <label for="member-id">Member ID</label>
                            <input type="text" id="member-id" name="member_id" class="form-control" placeholder="e.g. M001" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="member-name">Member Name</label>
                            <input type="text" id="member-name" name="member_name" class="form-control" placeholder="e.g. Rahul Sharma" required>
                        </div>
                    </div>

                    <div class="flex-between gap-4">
                        <div class="form-group" style="flex: 1;">
                            <label for="book-id">Book ID</label>
                            <input type="text" id="book-id" name="book_id" class="form-control" placeholder="e.g. B005" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="book-name">Book Name</label>
                            <input type="text" id="book-name" name="book_name" class="form-control" placeholder="e.g. Python Programming" required>
                        </div>
                    </div>

                    <div class="flex-between gap-4">
                        <div class="form-group" style="flex: 1;">
                            <label for="issue-date">Issue Date</label>
                            <input type="date" id="issue-date" name="issue_date" class="form-control" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="due-date">Due Date</label>
                            <input type="date" id="due-date" name="due_date" class="form-control" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Issue Book</button>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='api_client.js') }}"></script>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='transactions.js') }}"></script>
<script>
    lucide.createIcons();
    checkAuth("admin");
    document.getElementById('issue-date').valueAsDate = new Date();
    const dueDate = new Date();
    dueDate.setDate(dueDate.getDate() + 14);
    document.getElementById('due-date').valueAsDate = dueDate;
    document.getElementById("issue-book-form").addEventListener("submit", handleIssueBook);
</script>

</body>
</html>
