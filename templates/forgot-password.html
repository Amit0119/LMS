<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Forgot Password.">
    <title>Forgot Password - Smart Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-logo {
            margin-bottom: 24px;
        }
        .auth-logo div {
            width: 50px;
            height: 50px;
            background: var(--accent-gradient);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 20px;
            margin: 0 auto;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        #forgot-password-form {
            text-align: left;
        }
        .auth-links {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--text-muted);
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .auth-links a:hover {
            color: var(--text-primary);
        }
        #msg-box {
            display: none;
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
        }
        .msg-error { display: block !important; background: var(--status-error-bg); color: var(--status-error); border: 1px solid rgba(239, 68, 68, 0.25); }
        .msg-success { display: block !important; background: var(--status-success-bg); color: var(--status-success); border: 1px solid rgba(16, 185, 129, 0.25); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-logo">
                <div><i data-lucide="mail-question" style="color: white; width: 24px;"></i></div>
            </div>
            <h1 class="auth-title">Forgot Password</h1>
            <p class="auth-subtitle">Enter your registered email and we'll send a reset link</p>

            <form id="forgot-password-form">
                <div id="msg-box"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="e.g. name@example.com" required>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Send Reset Link <i data-lucide="arrow-right" style="width: 16px;"></i>
                </button>
            </form>

            <div class="auth-links">
                <a href="/login"><i data-lucide="arrow-left" style="width: 16px;"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="{{ url_for('static', filename='utils.js') }}"></script>
    <script src="{{ url_for('static', filename='api_client.js') }}"></script>
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script>
        lucide.createIcons();
        document.getElementById("forgot-password-form").addEventListener("submit", handleForgotPassword);
    </script>
</body>
</html>
