<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Borrowed Books - Smart Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #msg-box { display:none; padding:12px; border-radius:var(--radius-sm); margin-bottom:20px; font-size:13px; font-weight:500; text-align:center; }
        .msg-error { display:block!important; background:var(--status-error-bg); color:var(--status-error); border:1px solid rgba(239, 68, 68, 0.25); }
        .msg-success { display:block!important; background:var(--status-success-bg); color:var(--status-success); border:1px solid rgba(16, 185, 129, 0.25); }
        .borrowed-books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .book-transaction { background: var(--bg-surface); border: 1px solid var(--border-glass); border-radius: var(--radius-md); padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .book-transaction h4 { margin: 0; font-size: 1.1rem; color: var(--text-primary); }
        .book-transaction p { margin: 0; font-size: 0.9rem; color: var(--text-secondary); display: flex; justify-content: space-between; }
        .book-transaction strong { color: var(--text-primary); font-weight: 500; }
        .transaction-actions { display: flex; gap: 10px; margin-top: auto; }
        .transaction-actions button { flex: 1; padding: 8px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; outline: none; }
        .transaction-actions button:first-child { background: var(--accent-gradient); color: #fff; }
        .transaction-actions button:last-child { background: var(--bg-surface-hover); color: var(--status-success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .due-soon { border-color: rgba(245, 158, 11, 0.3); background: linear-gradient(180deg, rgba(245, 158, 11, 0.05) 0%, transparent 100%); }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header" style="padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-glass);">
            <img src="{{ url_for('static', filename='my.logo.png') }}" alt="Logo" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(244, 114, 182, 0.5);">
            <span id="library-name-display" style="font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">LMS</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/student-dashboard"><i data-lucide="layout-dashboard" class="icon"></i> My Dashboard</a></li>
            <li><a href="/student-catalog"><i data-lucide="search" class="icon"></i> Search Catalog</a></li>
            <li><a href="/student-borrowed" class="active"><i data-lucide="book-open" class="icon"></i> My Borrowed Books</a></li>
            <li><a href="/pay-fines"><i data-lucide="credit-card" class="icon"></i> Pay Fines</a></li>
            <li><a href="/profile"><i data-lucide="settings" class="icon"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-wrapper">
        <header class="top-nav">
            <div class="page-title">
                <p>Library Resources</p>
                <h1>My Borrowed Books</h1>
            </div>
            
            <div class="nav-actions">
                <div class="profile-dropdown-container" style="position: relative;">
                    <div class="user-profile" id="profile-toggle">
                        <div class="avatar" id="user-avatar-initial">A</div>
                    </div>
                    <div class="profile-menu" id="profile-menu">
                        <div class="profile-menu-header">
                            <div class="avatar" id="dropdown-avatar-initial">A</div>
                            <div class="profile-info">
                                <h4 id="dropdown-name">User Name</h4>
                                <p id="dropdown-email">user@example.com</p>
                            </div>
                        </div>
                        <div class="profile-menu-divider"></div>
                        <a href="/profile" class="profile-menu-item">
                            <i data-lucide="user" style="width:16px;"></i> My Profile
                        </a>
                        <a href="/settings" class="profile-menu-item">
                            <i data-lucide="settings" style="width:16px;"></i> Settings
                        </a>
                        <div class="profile-menu-divider"></div>
                        <a href="#" onclick="logout()" class="profile-menu-item text-danger">
                            <i data-lucide="log-out" style="width:16px;"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-area">
            
            <div id="msg-box"></div>
            
            <div id="borrowed-books-container" class="borrowed-books-grid">
                <!-- JS se dynamically fill hoga -->
                <div style="text-align:center; grid-column: 1 / -1; color: var(--text-muted); padding: 40px; background: var(--bg-surface); border-radius: var(--radius-lg); border: 1px dashed var(--border-glass);">
                    Loading your books...
                </div>
            </div>

        </div>
    </main>
</div>

<!-- JS Files -->
<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='api_client.js') }}"></script>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
<script>
    lucide.createIcons();
    checkAuth("student");
    loadBorrowedBooks();
</script>

</body>
</html>
