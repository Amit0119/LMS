<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Fines - Smart Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #msg-box { display:none; padding:12px; border-radius:var(--radius-sm); margin-bottom:20px; font-size:13px; font-weight:500; text-align:center; }
        .msg-error { display:block!important; background:var(--status-error-bg); color:var(--status-error); border:1px solid rgba(239, 68, 68, 0.25); }
        .msg-success { display:block!important; background:var(--status-success-bg); color:var(--status-success); border:1px solid rgba(16, 185, 129, 0.25); }
        .fine-card { background: var(--bg-surface); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 40px; text-align: center; max-width: 500px; margin: 0 auto; box-shadow: var(--shadow-soft); }
        .fine-amount { font-size: 48px; font-weight: bold; color: var(--status-error); margin: 20px 0; font-family: monospace;}
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header" style="padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-glass);">
            <img src="{{ url_for('static', filename='my.logo.png') }}" alt="Logo" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(244, 114, 182, 0.5);">
            <span id="library-name-display" style="font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">LMS</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/student-dashboard"><i data-lucide="layout-dashboard" class="icon"></i> My Dashboard</a></li>
            <li><a href="/student-catalog"><i data-lucide="search" class="icon"></i> Search Catalog</a></li>
            <li><a href="/student-borrowed"><i data-lucide="book-open" class="icon"></i> My Borrowed Books</a></li>
            <li><a href="/pay-fines" class="active"><i data-lucide="credit-card" class="icon"></i> Pay Fines</a></li>
            <li><a href="/profile"><i data-lucide="settings" class="icon"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-wrapper">
        <header class="top-nav">
            <div class="page-title">
                <p>Account Services</p>
                <h1>Pay Fines</h1>
            </div>
            
            <div class="nav-actions">
                <div class="profile-dropdown-container" style="position: relative;">
                    <div class="user-profile" id="profile-toggle">
                        <div class="avatar" id="user-avatar-initial">A</div>
                    </div>
                    <div class="profile-menu" id="profile-menu">
                        <div class="profile-menu-header">
                            <div class="avatar" id="dropdown-avatar-initial">A</div>
                            <div class="profile-info">
                                <h4 id="dropdown-name">User Name</h4>
                                <p id="dropdown-email">user@example.com</p>
                            </div>
                        </div>
                        <div class="profile-menu-divider"></div>
                        <a href="/profile" class="profile-menu-item">
                            <i data-lucide="user" style="width:16px;"></i> My Profile
                        </a>
                        <a href="/settings" class="profile-menu-item">
                            <i data-lucide="settings" style="width:16px;"></i> Settings
                        </a>
                        <div class="profile-menu-divider"></div>
                        <a href="#" onclick="logout()" class="profile-menu-item text-danger">
                            <i data-lucide="log-out" style="width:16px;"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-area">
            
            <div id="msg-box"></div>
            <div class="fine-card">
                <h3 style="color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">Total Outstanding Fine</h3>
                <div class="fine-amount" id="fine-amount-display">₹0</div>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;" id="fine-details">You have no pending fines.</p>
                <button class="btn btn-primary" id="pay-btn" style="width: 100%; display: none; padding: 12px;" onclick="handlePayFines()">Pay via UPI / Card</button>
            </div>

        </div>
    </main>
</div>

<!-- JS Files -->
<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='api_client.js') }}"></script>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
<script>
    lucide.createIcons();
    checkAuth("student");
    
    async function loadFines() {
        try {
            const user = getCurrentUser();
            const txns = await apiClient.getAllTransactions({ memberId: user.email, status: 'returned' });
            let total = txns.reduce((sum, t) => sum + (t.fine || 0), 0);
            
            document.getElementById('fine-amount-display').textContent = '₹' + total;
            if(total > 0) {
                document.getElementById('fine-details').textContent = "Please clear your dues to continue borrowing books.";
                document.getElementById('pay-btn').style.display = 'inline-block';
            }
        } catch(e) {}
    }
    loadFines();
    
    function handlePayFines() {
        showMessage('msg-box', 'Processing payment...', 'success');
        setTimeout(() => {
            showMessage('msg-box', 'Payment successful! Updating records...', 'success');
            setTimeout(() => location.reload(), 2000);
        }, 1500);
    }
</script>

</body>
</html>
