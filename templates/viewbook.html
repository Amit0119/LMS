<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Inventory - Smart Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="/static/my.logo.png" alt="Logo" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-glass-light);">
            <span class="sidebar-title">SmartLMS</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/"><i data-lucide="layout-dashboard" class="icon"></i> Dashboard</a></li>
            <li><a href="/viewbook" class="active"><i data-lucide="book" class="icon"></i> Book Inventory</a></li>
            <li><a href="/viewmember"><i data-lucide="users" class="icon"></i> Members</a></li>
            <li><a href="/all-transactions"><i data-lucide="arrow-left-right" class="icon"></i> Transactions</a></li>
            <li><a href="/analytics"><i data-lucide="bar-chart-2" class="icon"></i> Analytics</a></li>
            <li><a href="/settings"><i data-lucide="settings" class="icon"></i> Settings</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-wrapper">
        <!-- Top Navbar -->
        <header class="top-nav">
            <div class="page-title">
                <p>Catalog Management</p>
                <h1>Book Inventory</h1>
            </div>
            
            <div class="nav-actions">
                <a href="/addbook" class="btn btn-primary"><i data-lucide="plus"></i> Add new book</a>
                <div class="profile-dropdown-container" style="position: relative;">
                    <div class="user-profile" id="profile-toggle">
                        <div class="avatar" id="user-avatar-initial">A</div>
                    </div>
                    <div class="profile-menu" id="profile-menu">
                        <div class="profile-menu-header">
                            <div class="avatar" id="dropdown-avatar-initial">A</div>
                            <div class="profile-info">
                                <h4 id="dropdown-name">User Name</h4>
                                <p id="dropdown-email">user@example.com</p>
                            </div>
                        </div>
                        <div class="profile-menu-divider"></div>
                        <a href="/profile" class="profile-menu-item">
                            <i data-lucide="user" style="width:16px;"></i> My Profile
                        </a>
                        <a href="/settings" class="profile-menu-item">
                            <i data-lucide="settings" style="width:16px;"></i> Settings
                        </a>
                        <div class="profile-menu-divider"></div>
                        <a href="#" onclick="logout()" class="profile-menu-item text-danger">
                            <i data-lucide="log-out" style="width:16px;"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content-area">
            
            <!-- Inventory Table Card -->
            <div class="glass-card">
                
                <!-- Filters Bar -->
                <div class="flex-start gap-4 mb-6">
                    <div class="search-bar" style="width: 300px;">
                        <i data-lucide="search" style="width: 16px; color: var(--text-muted);"></i>
                        <input type="text" id="table-search" onkeyup="searchTable()" placeholder="Search by title, author or book ID">
                    </div>
                    
                    <select id="category-filter" onchange="searchTable()" class="form-control" style="width: 200px; padding: 8px 16px; background: var(--bg-surface); border-radius: 20px;">
                        <option value="">All categories</option>
                        <option value="science">Science</option>
                        <option value="technology">Technology</option>
                        <option value="mathematics">Mathematics</option>
                        <option value="literature">Literature</option>
                        <option value="history">History</option>
                        <option value="fiction">Fiction</option>
                        <option value="other">Other</option>
                    </select>

                    <button class="btn btn-secondary" style="border-radius: 20px; padding: 8px 16px;" onclick="document.getElementById('table-search').value=''; document.getElementById('category-filter').value=''; searchTable();">
                        Clear filters
                    </button>
                </div>
                
                <div id="msg-box" style="display:none; margin-bottom: 20px; padding: 10px; border-radius: 6px;"></div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Cover</th>
                                <th>Book ID</th>
                                <th>Book Name & Author</th>
                                <th>Category</th>
                                <th>Copies</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="books-table-body">
                            <!-- JS se dynamically fill hoga -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- JS Files -->
<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='api_client.js') }}"></script>
<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='books.js') }}"></script>
<script>
    lucide.createIcons();
    checkAuth("admin");
    // Ensure displayAllBooks exists and is called
    if (typeof displayAllBooks === 'function') {
        displayAllBooks();
    } else if (typeof loadBooksTable === 'function') {
        loadBooksTable();
    }
</script>

</body>
</html>
